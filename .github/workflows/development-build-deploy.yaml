# Amarpet order MCP — build image, push to registry, deploy on VM.
# Required GitHub Environment "development" variables:
#   BASE_URL, DOCKER_CONTAINER_REGISTRY, DOCKER_REPOSITORY_NAME, DOCKER_USERNAME,
#   VM_PUBLIC_IP, VM_USERNAME, SSH_PORT
# Optional: MCP_HOST_PORT (host port to map to container 3000; default 3000)
# Required secrets:
#   DOCKER_PASSWORD, SSH_KEY, API_KEY  (upstream Amarpet API key — same as server.mjs API_KEY)

name: Amarpet order MCP — development build and deploy

on:
  push:
    branches:
      - master
      - development

permissions:
  contents: read

jobs:
  build:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_CONTAINER_REGISTRY }}
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ vars.DOCKER_CONTAINER_REGISTRY }}/${{ vars.DOCKER_REPOSITORY_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VM_PUBLIC_IP }}
          username: ${{ vars.VM_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SSH_PORT }}
          script: |
            set -e
            docker login ${{ vars.DOCKER_CONTAINER_REGISTRY }} -u ${{ vars.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ vars.DOCKER_CONTAINER_REGISTRY }}/${{ vars.DOCKER_REPOSITORY_NAME }}:latest
            docker rm -f ${{ vars.DOCKER_REPOSITORY_NAME }} 2>/dev/null || true
            docker run -d \
              --name ${{ vars.DOCKER_REPOSITORY_NAME }} \
              --restart unless-stopped \
              -p ${{ vars.MCP_HOST_PORT || '3000' }}:3000 \
              -e BASE_URL='${{ vars.BASE_URL }}' \
              -e API_KEY='${{ secrets.API_KEY }}' \
              ${{ vars.DOCKER_CONTAINER_REGISTRY }}/${{ vars.DOCKER_REPOSITORY_NAME }}:latest
